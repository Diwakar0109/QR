services:
  - type: web
    name: qr-utility-app
    env: node
    rootDir: .
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/uploads
    disks:
      - name: qr-data
        mountPath: /var/data
        sizeGB: 1
      - name: qr-uploads
        mountPath: /var/uploads
        sizeGB: 1
