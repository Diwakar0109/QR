<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="QR Utility App — Create, manage, and share QR codes with role-based access control." />
  <title>QR Utility App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>

<body>
  <div id="app">
    <section id="splash" class="screen screen-active">
      <div class="card center-card">
        <h1>QR Utility App</h1>
        <p>Fast QR management for mobile and desktop.</p>
        <div class="loader"></div>
      </div>
    </section>

    <section id="auth" class="screen">
      <div class="card auth-card">
        <h2 id="authTitle">Login</h2>
        <p class="muted">Access your dashboard securely.</p>
        <div id="authError" class="alert alert-error hidden"></div>

        <form id="authForm">
          <div id="nameField" class="form-row hidden">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" />
          </div>

          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Minimum 6 chars" required />
          </div>

          <div id="roleField" class="form-row hidden">
            <label for="role">Role</label>
            <select id="role" name="role">
              <option value="student">Student</option>
              <option value="mentor">Mentor</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button id="authSubmit" class="btn btn-primary" type="submit">Login</button>
        </form>

        <button id="authToggle" class="btn btn-ghost" type="button">
          New user? Create account
        </button>
      </div>
    </section>

    <section id="dashboard" class="screen">
      <header class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p id="userInfo" class="muted"></p>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" class="btn btn-ghost" type="button">Refresh</button>
          <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        </div>
      </header>

      <div id="globalMessage" class="alert hidden"></div>

      <div class="grid">
        <article class="card">
          <h3>Create / Update QR Record</h3>
          <form id="qrForm">
            <input id="recordId" type="hidden" />
            <div class="form-row">
              <label for="qrText">Content</label>
              <textarea id="qrText" rows="3" required></textarea>
            </div>
            <div class="row-actions">
              <button class="btn btn-primary" type="submit" id="saveRecordBtn">Save Record</button>
              <button class="btn btn-ghost" type="button" id="clearFormBtn">Clear</button>
            </div>
          </form>
        </article>

        <article class="card">
          <h3>Live QR Preview</h3>
          <div class="preview-block">
            <div id="qrCanvas"></div>
            <button id="downloadQrBtn" class="btn btn-ghost" type="button">Download QR</button>
          </div>
        </article>
      </div>
      
      <article class="card">
        <div class="section-head">
          <h3>QR Records</h3>
          <span id="recordCount" class="badge">0</span>
        </div>
        <div id="recordList" class="record-list"></div>
      </article>

      <article id="adminPanel" class="card hidden">
        <div class="section-head">
          <h3>Admin Users</h3>
          <button id="loadUsersBtn" class="btn btn-ghost" type="button">Load Users</button>
        </div>
        <div id="usersList"></div>
      </article>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
